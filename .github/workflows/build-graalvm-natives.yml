name: Build GraalVM native images

on:
  workflow_dispatch:

env:
  VERSION: 1.2.2

jobs:
  native-image:
    name: GraalVM Native Image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x86_64

          - runner: ubuntu-24.04-arm
            platform: linux-arm64

          - runner: windows-latest
            platform: windows-x86_64

          - runner: macos-latest
            platform: macos-arm64

          - runner: macos-15-intel
            platform: macos-x86_64

    timeout-minutes: 60

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: '21'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle
          native-image-job-reports: 'true'

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build native distribution ZIP
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ runner.os }}" = "Windows" ]; then
            ./gradlew.bat :openccjavacli:nativeDistZip --no-daemon --stacktrace
          else
            ./gradlew :openccjavacli:nativeDistZip --no-daemon --stacktrace
          fi

      - name: Package release ZIP
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE="$(find . -type f -path "*/build/distributions/*-native-*.zip" | head -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            echo "Native ZIP not found"
            exit 1
          fi

          ARTIFACT_NAME="OpenccJavaCli-${VERSION}-${{ matrix.platform }}-native.zip"

          mkdir -p release
          cp "$ZIP_FILE" "release/$ARTIFACT_NAME"

          echo "ZIP_FILE=$ZIP_FILE" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"

          echo "Found: $ZIP_FILE"
          echo "Packaged: release/$ARTIFACT_NAME"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenccJavaCli-${{ env.VERSION }}-${{ matrix.platform }}-native
          path: release/${{ env.ARTIFACT_NAME }}
          if-no-files-found: error
          compression-level: 6